# =============================================================
# Exercise 1: Observability with Phoenix Tracing
# =============================================================
# Same workflow as Part 2, with one addition:
# the `general.telemetry` section enables Phoenix tracing
# for every LLM call and tool invocation automatically.
# =============================================================

llms:
  bielik:
    _type: openai
    base_url: "${VLLM_BASE_URL}"
    model: "${VLLM_MODEL_NAME}"
    api_key: "${VLLM_API_KEY}"
    temperature: 0.7
    max_tokens: 2048

functions:
  wiki_search:
    _type: wiki_search
    max_results: 2

  current_time:
    _type: current_datetime

workflow:
  _type: react_agent
  tool_names:
    - wiki_search
    - current_time
  llm_name: bielik
  max_tool_calls: 5
  verbose: true
  parse_agent_response_max_retries: 3
  raise_on_parsing_failure: false
  additional_instructions: "Używaj jak najmniej wywołań narzędzi. Gdy masz wystarczająco informacji, natychmiast podaj Final Answer. Nie szukaj dodatkowych powiązanych tematów."

# --- This is the only addition vs Part 2 ---
general:
  telemetry:
    tracing:
      phoenix:
        _type: phoenix
        project: bielik-nest-workshop
        endpoint: "http://localhost:${PHOENIX_PORT:-6006}/v1/traces"
