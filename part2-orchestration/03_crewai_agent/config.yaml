# =============================================================
# Exercise 3: CrewAI Agent Crew as NAT Function
# =============================================================
# This config registers a CrewAI crew (analyst + writer) as a
# NeMo Agent Toolkit Function. The crew takes a research topic,
# analyzes it, and produces a structured report.
# =============================================================

llms:
  bielik:
    _type: openai
    base_url: "${VLLM_BASE_URL}"
    model: "${VLLM_MODEL_NAME}"
    api_key: "${VLLM_API_KEY}"
    temperature: 0.7
    max_tokens: 2048

functions:
  # CrewAI writing crew registered as a NAT Function
  writing_crew:
    _type: crewai_writing_crew
    llm_ref: bielik
    description: "Zespół CrewAI analizujący wyniki badań i tworzący raport"

# Use the writing crew directly as the workflow
workflow:
  _type: react_agent
  tool_names:
    - writing_crew
  llm_name: bielik
  max_tool_calls: 3
  parse_agent_response_max_retries: 3
  raise_on_parsing_failure: false
  additional_instructions: "Używaj jak najmniej wywołań narzędzi. Gdy masz wystarczająco informacji, natychmiast podaj Final Answer. Nie szukaj dodatkowych powiązanych tematów."
