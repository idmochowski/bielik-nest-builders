services:
  workshop:
    build: .
    ports:
      - "8888:8888"
    env_file: .env.docker
    environment:
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:6006/v1/traces
      - PHOENIX_PORT=6006
    depends_on:
      phoenix:
        condition: service_started
    volumes:
      # Mount workshop files for live editing (optional - remove for frozen image)
      - ./part2-orchestration:/workshop/part2-orchestration
      - ./part3-profiling:/workshop/part3-profiling

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
